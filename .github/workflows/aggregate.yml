name: Aggregate index.json

# Rebuilds index.json from sources.json by walking every source repo's
# latest release and pulling plugin.toml / checksums.txt / SIGNATURE.
# Fires on three triggers:
#   1. repository_dispatch from any plugin repo after it publishes a
#      GitHub Release (the primary path — updates index within 30 s)
#   2. push to sources.json / scripts/aggregate.py (maintainer edits)
#   3. scheduled every 6 h as a safety net for missed dispatches
#   4. manual workflow_dispatch for operator-triggered rebuilds

on:
  repository_dispatch:
    types: [release-published]
  push:
    branches: [main]
    paths:
      - sources.json
      - scripts/aggregate.py
      - .github/workflows/aggregate.yml
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Only one aggregator run at a time — if a new release-published dispatch
# arrives while we're running, queue it.
concurrency:
  group: aggregate-index
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  aggregate:
    name: Rebuild catalog
    runs-on: ubuntu-latest
    steps:
      # Checkout with DESKMODAL_REPO_TOKEN so the aggregator can push
      # directly to protected main. The PAT is owned by an org admin,
      # and branch protection has `enforce_admins: false`, so admin
      # pushes bypass the required-status-check gate. Humans still go
      # through PRs by convention (and because their normal PATs don't
      # bypass status checks). If DESKMODAL_REPO_TOKEN is absent, fall
      # back to GITHUB_TOKEN which won't be able to bypass protection
      # but at least won't break the checkout.
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.DESKMODAL_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install signing deps
        run: pip install cryptography

      - name: Log dispatch context
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "Triggered by repository_dispatch event: ${{ github.event.action }}"
          echo "source_repo: ${{ github.event.client_payload.source_repo }}"
          echo "tag:         ${{ github.event.client_payload.tag }}"
          echo "fired_by:    ${{ github.event.client_payload.fired_by }}"
          echo "upstream run: ${{ github.event.client_payload.run_id }}"

      - name: Run aggregator
        env:
          # DESKMODAL_REPO_TOKEN is a PAT with read on the private
          # source repos AND write on THIS repo's releases. The
          # aggregator needs:
          #   - read access to paper-trading, price-feed-service,
          #     tradesurface releases (cross-repo API)
          #   - write access to appmarket releases (to upload mirrored
          #     assets on THIS repo)
          # GITHUB_TOKEN would cover the second but not the first, so
          # we need the PAT for the Python API calls. The git push
          # itself still uses GITHUB_TOKEN via the checkout above.
          GITHUB_TOKEN: ${{ secrets.DESKMODAL_REPO_TOKEN }}
        run: python3 scripts/aggregate.py --sources sources.json --out index.json

      - name: Sign index.json with DeskModal publisher key
        # 113-A iter24 F-071 — drop the `if: env.SIGNING_KEY != ''`
        # guard. Previous behaviour: if the secret was unset the
        # workflow silently published an UNSIGNED index.json. Combined
        # with the agent's soft-posture boot verifier (iter 10),
        # the sign-and-verify chain had two soft links.
        # Now: fail-closed. CI fails the run if SIGNING_KEY isn't
        # configured, forcing the operator to set the secret rather
        # than silently shipping unsigned catalogs.
        env:
          SIGNING_KEY: ${{ secrets.DESKMODAL_SIGNING_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::DESKMODAL_SIGNING_KEY secret is not configured." >&2
            echo "::error::Catalog publishing requires a configured Ed25519 signing key." >&2
            echo "::error::See marketplace/appmarket/CLAUDE.md for setup; do not bypass." >&2
            exit 1
          fi
          # 113-A iter24 F-072 — pre-validate hex shape before
          # passing to from_private_bytes. Without this, a malformed
          # secret raises a crypto error whose message includes the
          # input length, leaking partial-shape info to GitHub Actions
          # logs. With the mask + length guard, errors stay opaque.
          echo "::add-mask::$SIGNING_KEY"
          if [ ${#SIGNING_KEY} -ne 64 ]; then
            echo "::error::SIGNING_KEY length is not 64 hex chars." >&2
            exit 1
          fi
          if ! printf '%s' "$SIGNING_KEY" | grep -Eqi '^[0-9a-f]{64}$'; then
            echo "::error::SIGNING_KEY contains non-hex characters." >&2
            exit 1
          fi
          python3 <<'PY'
          import os
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          key = Ed25519PrivateKey.from_private_bytes(bytes.fromhex(os.environ["SIGNING_KEY"]))
          with open("index.json", "rb") as f:
              payload = f.read()
          sig = key.sign(payload)
          with open("index.json.sig", "wb") as f:
              f.write(sig)
          # Self-verify
          key.public_key().verify(sig, payload)
          print("OK: index.json signed and verified")
          PY

      - name: Commit + push if changed
        run: |
          if [ -z "$(git status --porcelain index.json index.json.sig 2>/dev/null)" ]; then
            echo "[noop] index.json unchanged, skipping commit"
            exit 0
          fi
          git config user.name  "appmarket-aggregator"
          git config user.email "appmarket-aggregator@users.noreply.github.com"
          git add index.json
          [ -f index.json.sig ] && git add index.json.sig
          COUNT=$(python3 -c "import json; print(len(json.load(open('index.json'))['catalog']))")
          # [skip ci] tag — we don't want the aggregate.yml workflow to
          # re-trigger itself on this push (the cron + repository_dispatch
          # paths are the canonical triggers).
          git commit -m "chore(aggregator): rebuild catalog ($COUNT entries) [skip ci]"
          git push
