<!-- desk-modal.tradesurface.screener — market -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.75" cy="0.25" r="0.75">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#base)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)" opacity="0.35"/>

  <!-- radar origin at top-right corner of safe area -->
  <circle cx="104" cy="24" r="6" fill="#3b82f6"/>

  <!-- outer sweep arc, r=78, quarter sweep -->
  <path d="M 26 24 A 78 78 0 0 0 104 102" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>

  <!-- inner sweep arc, r=48, accent-deep secondary -->
  <path d="M 56 24 A 48 48 0 0 0 104 72" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" opacity="0.75"/>

  <!-- target match — the found ticker (lower-left) -->
  <circle cx="36" cy="92" r="7" fill="#3b82f6"/>

  <!-- family marker -->
  <rect x="113" y="12" width="3" height="3" fill="#3b82f6"/>

  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none" stroke="rgba(120,150,255,0.18)"/>
</svg>
