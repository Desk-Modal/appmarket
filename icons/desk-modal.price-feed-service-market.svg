<!-- desk-modal.price-feed-service — market -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#base)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)" opacity="0.35"/>

  <!-- ticker-tape baseline (the wire) -->
  <line x1="26" y1="80" x2="108" y2="80" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>

  <!-- tick marks of varying height — the stream of updating values -->
  <line x1="42" y1="80" x2="42" y2="54" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
  <line x1="60" y1="80" x2="60" y2="38" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
  <line x1="78" y1="80" x2="78" y2="60" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
  <line x1="96" y1="80" x2="96" y2="46" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>

  <!-- accent-deep secondary ticks (softer, fills the rhythm) -->
  <line x1="34" y1="80" x2="34" y2="68" stroke="#2563eb" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
  <line x1="104" y1="80" x2="104" y2="66" stroke="#2563eb" stroke-width="4" stroke-linecap="round" opacity="0.75"/>

  <!-- flow-direction arrowhead at the left end of the tape -->
  <path d="M 26 80 L 18 74 M 26 80 L 18 86" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>

  <!-- family marker? NO — price-feed-service is not in tradesurface.* family -->

  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none" stroke="rgba(120,150,255,0.18)"/>
</svg>
