<!-- desk-modal.price-feed-service — market -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.35" cy="0.5" r="0.65">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#base)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)" opacity="0.35"/>

  <!-- source core (solid) -->
  <circle cx="40" cy="64" r="10" fill="#3b82f6"/>

  <!-- directional broadcast arcs, three concentric, increasing opacity gap outward -->
  <path d="M 40 40 A 24 24 0 0 1 40 88" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
  <path d="M 40 28 A 36 36 0 0 1 40 100" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <path d="M 40 16 A 48 48 0 0 1 40 112" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.4"/>

  <!-- destination indicator - a small vertical line at x=108 showing the sink -->
  <line x1="108" y1="48" x2="108" y2="80" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>

  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none" stroke="rgba(120,150,255,0.18)"/>
</svg>
