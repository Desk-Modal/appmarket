<!-- desk-modal.tradesurface.news — market -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="news-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="news-glow" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#news-base)"/>
  <rect width="128" height="128" rx="28" fill="url(#news-glow)" opacity="0.4"/>

  <!-- newspaper body -->
  <rect x="22" y="30" width="84" height="72" rx="6" fill="none" stroke="#22d3ee" stroke-width="5"/>

  <!-- masthead bar -->
  <line x1="22" y1="48" x2="106" y2="48" stroke="#22d3ee" stroke-width="5"/>

  <!-- masthead dot (breaking-news pulse anchor) -->
  <circle cx="32" cy="39" r="3.5" fill="#ef4444"/>

  <!-- body lines (severity-ranked: shorter = lower severity) -->
  <line x1="34" y1="62" x2="94" y2="62" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
  <line x1="34" y1="74" x2="94" y2="74" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="34" y1="86" x2="74" y2="86" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
</svg>
