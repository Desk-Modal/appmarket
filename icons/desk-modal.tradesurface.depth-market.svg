<!-- desk-modal.tradesurface.depth — market -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#base)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)" opacity="0.35"/>

  <!-- bid strata (above centerline, green) — widening toward the center -->
  <rect x="52" y="28" width="24" height="8" rx="2" fill="#22c55e" opacity="0.55"/>
  <rect x="44" y="40" width="40" height="8" rx="2" fill="#22c55e" opacity="0.7"/>
  <rect x="36" y="52" width="56" height="8" rx="2" fill="#22c55e"/>

  <!-- centerline (spread, mid) -->
  <line x1="24" y1="64" x2="104" y2="64" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>

  <!-- ask strata (below centerline, red) — narrowing outward -->
  <rect x="36" y="68" width="56" height="8" rx="2" fill="#ef4444"/>
  <rect x="44" y="80" width="40" height="8" rx="2" fill="#ef4444" opacity="0.7"/>
  <rect x="52" y="92" width="24" height="8" rx="2" fill="#ef4444" opacity="0.55"/>

  <!-- family marker -->
  <rect x="113" y="12" width="3" height="3" fill="#3b82f6"/>

  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none" stroke="rgba(120,150,255,0.18)"/>
</svg>
