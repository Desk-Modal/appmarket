<!-- desk-modal.paper-trading — market -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#base)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)" opacity="0.35"/>

  <!-- real book stubs peeking out from behind (top-right + bottom-left) -->
  <rect x="78" y="20" width="22" height="14" rx="3" fill="#2563eb"/>
  <rect x="28" y="94" width="22" height="14" rx="3" fill="#2563eb"/>

  <!-- paper ledger (dominant: dashed outline, centered) -->
  <rect x="30" y="28" width="68" height="76" rx="8" fill="#0b1120" fill-opacity="0.85" stroke="#3b82f6" stroke-width="6" stroke-dasharray="8 6" stroke-linecap="round"/>
  <line x1="42" y1="54" x2="86" y2="54" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="42" y1="74" x2="78" y2="74" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>

  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none" stroke="rgba(120,150,255,0.18)"/>
</svg>
