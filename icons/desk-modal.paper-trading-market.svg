<!-- desk-modal.paper-trading — market -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#base)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)" opacity="0.35"/>

  <!-- REAL candle — solid bullish green, the underlying market data -->
  <line x1="58" y1="22" x2="58" y2="108" stroke="#22c55e" stroke-width="6" stroke-linecap="round"/>
  <rect x="40" y="42" width="36" height="48" rx="4" fill="#22c55e"/>

  <!-- PRACTICE candle — ghost outline body, offset right and slightly up -->
  <rect x="60" y="34" width="36" height="48" rx="4" fill="none" stroke="#22c55e" stroke-width="6" stroke-opacity="0.5"/>

  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none" stroke="rgba(120,150,255,0.18)"/>
</svg>
