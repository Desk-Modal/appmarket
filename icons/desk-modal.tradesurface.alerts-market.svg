<!-- desk-modal.tradesurface.alerts — market -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#base)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)" opacity="0.35"/>

  <!-- threshold line (dashed to distinguish from the waveform) -->
  <line x1="18" y1="70" x2="110" y2="70" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" stroke-dasharray="6 5" opacity="0.8"/>

  <!-- baseline waveform: flat, small oscillations, then a sharp spike upward crossing threshold, then return -->
  <path d="M 18 78 L 34 78 L 40 74 L 46 78 L 56 78 L 64 26 L 72 78 L 82 78 L 88 74 L 94 78 L 110 78"
        fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- alert dot at the spike peak -->
  <circle cx="64" cy="26" r="6" fill="#ef4444"/>

  <!-- family marker -->
  <rect x="113" y="12" width="3" height="3" fill="#3b82f6"/>

  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none" stroke="rgba(120,150,255,0.18)"/>
</svg>
