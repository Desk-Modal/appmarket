<!-- desk-modal.tradesurface.chart — market -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#base)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)" opacity="0.35"/>

  <!-- supporting ghost candles, left and right, accent-deep -->
  <line x1="32" y1="48" x2="32" y2="96" stroke="#2563eb" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <rect x="24" y="60" width="16" height="24" rx="2" fill="#2563eb" opacity="0.55"/>

  <line x1="96" y1="54" x2="96" y2="104" stroke="#2563eb" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <rect x="88" y="68" width="16" height="28" rx="2" fill="#2563eb" opacity="0.55"/>

  <!-- dominant candle, bullish -->
  <line x1="64" y1="22" x2="64" y2="108" stroke="#22c55e" stroke-width="6" stroke-linecap="round"/>
  <rect x="46" y="42" width="36" height="48" rx="4" fill="#22c55e"/>

  <!-- family marker -->
  <rect x="113" y="12" width="3" height="3" fill="#3b82f6"/>

  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none" stroke="rgba(120,150,255,0.18)"/>
</svg>
