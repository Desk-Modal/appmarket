<!-- desk-modal.tradesurface.screener — toolbar (glass) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- radar origin — fixed point at top-right corner of safe area -->
  <circle cx="104" cy="24" r="7" fill="#60a5fa" fill-opacity="0.92"/>

  <!-- outer radar arc, r=76 from origin, sweeping across the safe area -->
  <path d="M 28 24 A 76 76 0 0 0 104 100" fill="none" stroke="#60a5fa" stroke-opacity="0.92" stroke-width="7.5" stroke-linecap="round"/>

  <!-- target dot — the match, lower-left -->
  <circle cx="36" cy="92" r="8" fill="#60a5fa" fill-opacity="0.92"/>

  <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none" stroke="rgba(120,150,255,0.22)"/>
</svg>
