<!-- desk-modal.tradesurface.earnings — market -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="earn-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="earn-glow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#earn-base)"/>
  <rect width="128" height="128" rx="28" fill="url(#earn-glow)" opacity="0.4"/>

  <!-- calendar body -->
  <rect x="22" y="32" width="84" height="76" rx="6" fill="none" stroke="#34d399" stroke-width="5"/>

  <!-- masthead bar -->
  <line x1="22" y1="50" x2="106" y2="50" stroke="#34d399" stroke-width="5"/>

  <!-- calendar bind hooks -->
  <line x1="42" y1="22" x2="42" y2="38" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
  <line x1="86" y1="22" x2="86" y2="38" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>

  <!-- earnings event chart (peak indicating reaction-tracker spike) -->
  <polyline points="34,90 46,82 58,90 70,68 82,62" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="82" cy="62" r="5" fill="#22d3ee"/>
</svg>
